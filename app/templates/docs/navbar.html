{% extends "docs/base.html" %}
{% load static %}
{% block css_files %}
    <link rel="stylesheet" href="{% static 'files/navbar.css' %}">
{% endblock css_files %}
{% block content %}
    <div class="topnav">
        <a class="active" href="{% url "MainView" %}">Home</a>
        <a href="{% url "AddPost" %}">add post</a>
        <a href="{% url "MyPosts" user %}">My posts</a>
        {%if request.user.is_authenticated%}
            <a href="{% url "logout" %}">Logout</a>
        {% else %}
            <a href="{% url "login" %}">Login</a>
        {% endif %}
        {% if not request.user.is_authenticated %}
            <a href="{% url "register" %}">Register</a>
        {% endif %}
    </div>
{% endblock content %}
